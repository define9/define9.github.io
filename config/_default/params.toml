mainSections = ["posts"]
rssFullContent = true
favicon = "/favicon.ico"

[colorScheme]
  toggle = true
  default = "auto"

[sidebar]
  avatar = "https://q2.qlogo.cn/headimg_dl?dst_uin=924753116&spec=100"
  emoji = "🎯"
  subtitle = "技术笔记与生活随想"
  compact = true

[article]
  headingAnchor = true
  readingTime = true
  toc = true
  [article.license]
    enabled = false
    default = "CC BY-NC-SA 4.0"
  [article.mermaid]
    look = "classic"
    lightTheme = "default"
    darkTheme = "dark"
    securityLevel = "strict"

[widgets]
  homepage = [
    { type = "search" },
    { type = "categories", params = { limit = 10 } },
    { type = "tag-cloud", params = { limit = 10 } },
    { type = "archives", params = { limit = 10 } }
  ]
  page = [
    { type = "toc" },
    { type = "taxonomy", params = { taxonomy = "categories", limit = 10 } },
    { type = "taxonomy", params = { taxonomy = "tags", limit = 10 } }
  ]
